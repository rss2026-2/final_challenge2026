particle_filter:
  ros__parameters:

    # -- Particle filter-related parameters --
    
    # The frame you should publish your transform to
    particle_filter_frame: "/base_link"

    # The names of topics to listen and publish to
    map_topic: "/map"
    scan_topic: "/scan"
    odom_topic: "/vesc/odom"

    # Number of particles we're using
    num_particles: 100

    # TODO: use this somewhere?
    # angle stride for downsampling the lidar data
    angle_step: 11

    # -- Motion model-related parameters --
    
    # Deterministic flag; set to true to remove all added noise
    deterministic: false

    motion_pos_trans_noise: 0.38 # Proportion of position change affecting translational noise
    motion_orient_trans_noise: 0.3 # Proportion of orientation change affecting translational noise
    motion_pos_rot_noise: 0.4 # Proportion of position change affecting rotational noise
    motion_orient_rot_noise: 0.65 # Proportion of orientation change affecting rotational noise

    # -- Sensor model-related parameters --
    
    # Timer period the sensor model updates to
    timer_period: 1.0 

    # Model alpha parameters
    alpha_hit: 0.71
    alpha_short: 0.10
    alpha_max: 0.07
    alpha_rand: 0.12
    sigma_hit: 10.0

    # The number of lidar beams emitted from
    # each particle. This doesn't need to be
    # equal to the actual number (>1000)
    # so long as you downsample properly
    num_beams_per_particle: 99

    # Discretize the theta space for faster ray tracing
    scan_theta_discretization: 500.0

    # The field of view centered around theta=0
    scan_field_of_view: 4.71 # radians

    lidar_scale_to_map_scale: 1.0


    
